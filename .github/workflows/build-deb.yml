name: Build .deb packages for Raspbian/Debian Bookworm

# Triggered manually only — go to Actions → this workflow → Run workflow.
# Optionally supply a version string (e.g. 1.0.0); leaving it empty produces
# a dev snapshot (0.0.0~dev.<short-sha>).
on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Package version (e.g. 1.0.0).
          Leave empty for a dev snapshot (0.0.0~dev.<short-sha>).
        required: false
        default: ''

jobs:
  build-deb:
    name: Build .deb (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # build all architectures even if one fails
      matrix:
        include:
          - arch: arm64
            platform: linux/arm64
            qemu: true
          - arch: armhf
            platform: linux/arm/v7
            qemu: true
          - arch: amd64
            platform: linux/amd64
            qemu: false

    steps:
      # ------------------------------------------------------------------ #
      # 1. Check out the repository                                          #
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Determine the package version                                     #
      #                                                                      #
      # Debian version format: UPSTREAM-DEBREVISION  e.g. 1.0.0-1           #
      # The ~ character sorts below any release, so dev snapshots always    #
      # appear older than a real version to apt.                             #
      # ------------------------------------------------------------------ #
      - name: Set package version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            DEB_VERSION="${{ inputs.version }}-1"
          else
            SHORT_SHA="${GITHUB_SHA::8}"
            DEB_VERSION="0.0.0~dev.${SHORT_SHA}-1"
          fi
          echo "deb_version=${DEB_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building package version: ${DEB_VERSION} for ${{ matrix.arch }}"

      # ------------------------------------------------------------------ #
      # 3. Install QEMU (ARM architectures only)                            #
      #                                                                      #
      # QEMU lets the x86-64 runner execute ARM Docker containers so that   #
      # pip downloads the correct ABI wheels and compiled .so files match   #
      # the target CPU.  amd64 runs natively — no QEMU needed.             #
      # ------------------------------------------------------------------ #
      - name: Set up QEMU for ARM emulation
        if: ${{ matrix.qemu }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      # ------------------------------------------------------------------ #
      # 4. Build the .deb inside a Debian Bookworm container                #
      #                                                                      #
      # Running inside the target architecture/OS ensures that:             #
      #   • pip downloads the correct ABI wheels for this architecture      #
      #   • compiled .so files have the matching ABI                        #
      #   • the Python version matches Bookworm's python3 (3.11)            #
      #                                                                      #
      # The Architecture field in debian/control is patched dynamically so  #
      # a single control file covers all three build targets.               #
      #                                                                      #
      # dpkg-buildpackage places output files one directory above the       #
      # source tree (/), so we move them to /workspace/output/ before the  #
      # container exits.                                                     #
      # ------------------------------------------------------------------ #
      - name: Build .deb inside ${{ matrix.arch }} Bookworm container
        env:
          DEB_VERSION: ${{ steps.version.outputs.deb_version }}
          DEB_ARCH: ${{ matrix.arch }}
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e "DEB_VERSION=${DEB_VERSION}" \
            -e "DEB_ARCH=${DEB_ARCH}" \
            debian:bookworm \
            bash -c '
              set -e

              echo "==> Architecture: ${DEB_ARCH}"
              echo "==> Package version: ${DEB_VERSION}"

              echo "==> Installing build dependencies"
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                debhelper build-essential python3 python3-pip

              echo "==> Patching debian/changelog version to ${DEB_VERSION}"
              sed -i \
                "s/^avnav-meshtastic-plugin ([^)]*)/avnav-meshtastic-plugin (${DEB_VERSION})/" \
                debian/changelog

              echo "==> Patching debian/control Architecture to ${DEB_ARCH}"
              sed -i \
                "s/^Architecture: .*/Architecture: ${DEB_ARCH}/" \
                debian/control

              echo "==> Running dpkg-buildpackage"
              # -b  build binary package only (no source tarball)
              # -us skip signing the source package
              # -uc skip signing the .changes file
              dpkg-buildpackage -b -us -uc

              echo "==> Collecting output artefacts"
              mkdir -p /workspace/output
              mv /*.deb /*.buildinfo /*.changes /workspace/output/ 2>/dev/null || true
              echo "==> Contents of output/"
              ls -lh /workspace/output/
            '

      # ------------------------------------------------------------------ #
      # 5. Upload the .deb as a workflow artifact                           #
      #                                                                      #
      # Find it under Actions → this run → Artifacts.                      #
      # The -dbgsym companion package (debug symbols) is excluded.         #
      # ------------------------------------------------------------------ #
      - name: Upload .deb artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: avnav-meshtastic-plugin_${{ steps.version.outputs.deb_version }}_${{ matrix.arch }}
          path: |
            output/*.deb
            !output/*dbgsym*.deb
          retention-days: 30
          if-no-files-found: error
